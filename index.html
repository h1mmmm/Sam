<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>For Samuuu ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ff9a9e,#fad0c4);
    font-family:'Poppins',sans-serif;
}

.container{
    text-align:center;
}

button{
    padding:18px 40px;
    border:none;
    border-radius:50px;
    background:white;
    color:#ff4d6d;
    font-size:1.2rem;
    font-weight:600;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

button:hover{
    transform:scale(1.08);
}

h1{
    display:none;
    margin-top:30px;
    color:white;
    font-size:3rem;
    font-weight:500;
    letter-spacing:1px;
    line-height:1.4;
    text-shadow:0 4px 12px rgba(0,0,0,0.25);
    animation:fade 1s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(20px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

.heart{
    position:absolute;
    color:white;
    font-size:22px;
    animation:float 5s linear infinite;
}

@keyframes float{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-10vh);
        opacity:0;
    }
}
</style>
</head>

<body>

<div class="container">
    <button onclick="showLove()">Click Me ❤️</button>

    <h1 id="loveText">
        I LOVE YOUUUUU <br>
        SAMUUUUUUUUUUUU <br>
        BABYYYYY ❤️
    </h1>
</div>

<script>
function showLove(){
    document.getElementById("loveText").style.display="block";
}

function createHeart(){
    const heart=document.createElement("div");
    heart.classList.add("heart");
    heart.innerHTML="❤️";

    heart.style.left=Math.random()*100+"vw";
    heart.style.fontSize=(Math.random()*20+15)+"px";
    heart.style.animationDuration=(Math.random()*3+3)+"s";

    document.body.appendChild(heart);

    setTimeout(()=>{
        heart.remove();
    },5000);
}

setInterval(createHeart,300);
</script>

</body>
</html>
